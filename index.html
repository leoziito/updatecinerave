<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Configuração de cor do navegador -->
    <meta id="cor-navegador" name="theme-color" content="#E40303">
    <meta name="color-scheme" content="light dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="translucent">

    <title>Queerflix - Liquid Glass App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonte Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">

    <style>
        /* Base e Reset com as Cores EXATAS */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            animation: rainbow-cycle 360s linear infinite;
        }

        /* Cores oficiais da Bandeira LGBT fornecidas */
        @keyframes rainbow-cycle {
            0%, 14%        { background-color: #E40303; } /* Vermelho */
            16.66%, 30.66% { background-color: #FF8C00; } /* Laranja */
            33.33%, 47.33% { background-color: #FFED00; } /* Amarelo */
            50%, 64%       { background-color: #008026; } /* Verde */
            66.66%, 80.66% { background-color: #24408E; } /* Azul */
            83.33%, 97.33% { background-color: #732982; } /* Roxo */
            100%           { background-color: #E40303; } /* Volta pro Vermelho */
        }

        .blob-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(90px);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 15s ease-in-out infinite alternate;
            mix-blend-mode: overlay;
        }

        .blob-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: rgba(255, 255, 255, 0.4); }
        .blob-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background: rgba(0, 0, 0, 0.5); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 50vw; height: 50vw; background: rgba(255, 255, 255, 0.25); animation-delay: -10s; }

        @keyframes morph {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            100% { transform: translate(15vw, 10vh) scale(1.3) rotate(45deg); border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%; }
        }

        /* Estilos do Liquid Glass (Mais Translúcido) */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.05); /* Mais transparente (Clear Glass) */
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15), inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }

        .liquid-glass-active {
            background: rgba(255, 255, 255, 0.15); /* Botão ativo levemente mais visível */
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* ==========================================
           IDENTIDADE VISUAL DA LOGO
           ========================================== */
        
        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            position: relative;
        }

        .brand-mark {
            position: relative;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-mark-blob {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3), inset 0 2px 10px rgba(255, 255, 255, 0.5);
            animation: logo-morph 4s ease-in-out infinite alternate;
        }

        .brand-mark-play {
            width: 16px;
            height: 16px;
            background: white;
            clip-path: polygon(15% 0, 100% 50%, 15% 100%);
            position: relative;
            z-index: 2;
            margin-left: 3px; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        @keyframes logo-morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg); }
            100% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%; transform: rotate(15deg); }
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.85rem;
            font-weight: 900;
            letter-spacing: 0.5px;
            position: relative;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 6px 16px rgba(0, 0, 0, 0.35), 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .logo-text::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            pointer-events: none;
            z-index: 2;
            text-shadow: none; 
        }

        .sparkle {
            position: absolute;
            fill: #FFFF00;
            filter: drop-shadow(0 0 6px #FFA500);
            animation: sparkle-twinkle 2.5s ease-in-out infinite alternate;
            z-index: 3;
        }

        .sparkle-1 { width: 18px; height: 18px; top: -10px; right: -15px; }
        .sparkle-4 { width: 10px; height: 10px; top: 12px; right: -30px; animation-delay: -0.7s; animation-duration: 2s; }
        .sparkle-5 { width: 14px; height: 14px; bottom: -2px; right: -20px; animation-delay: -1.8s; animation-direction: alternate-reverse; }
        .sparkle-2 { width: 12px; height: 12px; bottom: 2px; left: -10px; animation-delay: -1s; animation-direction: alternate-reverse; }
        .sparkle-3 { width: 14px; height: 14px; top: 0px; left: -18px; animation-delay: -1.5s; }

        @keyframes sparkle-twinkle {
            0% { transform: scale(0.6) rotate(0deg); opacity: 0.6; filter: drop-shadow(0 0 2px #FFA500); }
            100% { transform: scale(1.2) rotate(45deg); opacity: 1; filter: drop-shadow(0 0 10px #FFD700); }
        }

        /* Área de Rolagem Infinita */
        .infinite-scroll-area { 
            min-height: 400vh; 
            width: 100%; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Animação para troca de abas */
        .tab-enter {
            animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-icon { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="antialiased selection:bg-white/30">

    <div class="blob-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Cabeçalho Mais Translúcido -->
    <header id="main-header" style="padding-top: env(safe-area-inset-top);" class="fixed top-0 w-full h-[6rem] liquid-glass rounded-b-[2.5rem] z-40 transition-transform duration-500 ease-in-out flex items-center justify-center">
        <div class="brand-container mt-2">
            <div class="brand-mark">
                <div class="brand-mark-blob"></div>
                <div class="brand-mark-play"></div>
                <svg class="sparkle sparkle-3" viewBox="0 0 24 24"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
            </div>
            <div class="relative">
                <h1 class="logo-text" data-text="QUEERFLIX">QUEERFLIX</h1>
                <svg class="sparkle sparkle-2" viewBox="0 0 24 24"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
                <svg class="sparkle sparkle-1" viewBox="0 0 24 24"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
                <svg class="sparkle sparkle-4" viewBox="0 0 24 24"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
                <svg class="sparkle sparkle-5" viewBox="0 0 24 24"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
            </div>
        </div>
    </header>

    <main class="pt-28 pb-32">
        <!-- Textos de teste pra você ver a animação de Fade Slide Up -->
        <div id="tab-inicio" class="tab-pane block infinite-scroll-area px-6 text-center tab-enter">
            <h2 class="text-2xl font-bold mt-10">Página Início</h2>
            <p class="mt-2 text-white/70">O conteúdo aparecerá deslizando para cima suavemente.</p>
        </div>
        <div id="tab-explorar" class="tab-pane hidden infinite-scroll-area px-6 text-center">
            <h2 class="text-2xl font-bold mt-10">Página Explorar</h2>
            <p class="mt-2 text-white/70">Buscar novos filmes e séries.</p>
        </div>
        <div id="tab-perfil" class="tab-pane hidden infinite-scroll-area px-6 text-center">
            <h2 class="text-2xl font-bold mt-10">Seu Perfil</h2>
            <p class="mt-2 text-white/70">Configurações e favoritos.</p>
        </div>
    </main>

    <!-- Menu Inferior Mais Translúcido -->
    <nav id="bottom-nav" style="margin-bottom: env(safe-area-inset-bottom);" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-[5.5rem] liquid-glass rounded-full z-50 flex justify-around items-center px-3 transition-transform duration-500 ease-in-out">
        <button class="nav-btn liquid-glass-active rounded-full w-14 h-14 flex items-center justify-center transition-all duration-300 group" data-tab="inicio">
            <i data-lucide="home" class="nav-icon w-6 h-6 text-white group-hover:scale-110 drop-shadow-md"></i>
        </button>
        <button class="nav-btn rounded-full w-14 h-14 flex items-center justify-center transition-all duration-300 group hover:bg-white/10" data-tab="explorar">
            <i data-lucide="search" class="nav-icon w-6 h-6 text-white/60 group-hover:text-white group-hover:scale-110"></i>
        </button>
        <button class="nav-btn rounded-full w-14 h-14 flex items-center justify-center transition-all duration-300 group hover:bg-white/10" data-tab="perfil">
            <i data-lucide="user" class="nav-icon w-6 h-6 text-white/60 group-hover:text-white group-hover:scale-110"></i>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        // ----------------------------------------------------------------------
        // SISTEMA ATUALIZADO (E MAIS RÁPIDO) DE SINCRONIZAÇÃO DO NAVEGADOR
        // Usando requestAnimationFrame para fluidez e um limitador de 150ms
        // ----------------------------------------------------------------------
        const metaThemeColor = document.getElementById('cor-navegador');
        let ultimaAtualizacao = 0;
        
        function rgbToHex(rgb) {
            const match = rgb.match(/\d+/g);
            if (!match) return '#E40303';
            const r = parseInt(match[0]);
            const g = parseInt(match[1]);
            const b = parseInt(match[2]);
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        function syncBrowserColor(timestamp) {
            // Atualiza a cada 150ms (muito rápido visualmente, mas seguro pro Safari)
            if (timestamp - ultimaAtualizacao > 150) {
                const currentColor = window.getComputedStyle(document.body).backgroundColor;
                metaThemeColor.setAttribute('content', rgbToHex(currentColor));
                ultimaAtualizacao = timestamp;
            }
            requestAnimationFrame(syncBrowserColor);
        }
        
        requestAnimationFrame(syncBrowserColor);

        // ----------------------------------------------------------------------
        // LÓGICA DE NAVEGAÇÃO COM ANIMAÇÃO FADE-SLIDE
        // ----------------------------------------------------------------------
        const buttons = document.querySelectorAll('.nav-btn');
        const tabs = document.querySelectorAll('.tab-pane');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove estilos ativos
                buttons.forEach(b => {
                    b.classList.remove('liquid-glass-active');
                    b.classList.add('hover:bg-white/10');
                    const icon = b.querySelector('.nav-icon');
                    if (icon) {
                        icon.classList.remove('text-white', 'drop-shadow-md');
                        icon.classList.add('text-white/60');
                    }
                });

                // Adiciona estilo ativo no botão clicado
                btn.classList.add('liquid-glass-active');
                btn.classList.remove('hover:bg-white/10');
                const activeIcon = btn.querySelector('.nav-icon');
                if (activeIcon) {
                    activeIcon.classList.remove('text-white/60');
                    activeIcon.classList.add('text-white', 'drop-shadow-md');
                }

                // Esconde as abas e reseta a animação
                tabs.forEach(tab => {
                    tab.classList.add('hidden');
                    tab.classList.remove('block', 'tab-enter');
                });

                // Puxa a aba alvo e aplica o Fade In Up
                const targetId = btn.getAttribute('data-tab');
                const targetTab = document.getElementById(`tab-${targetId}`);
                
                targetTab.classList.remove('hidden');
                targetTab.classList.add('block');
                
                // Força um "reflow" do DOM para a animação reiniciar do zero toda vez
                void targetTab.offsetWidth;
                targetTab.classList.add('tab-enter');

                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        // Esconder Header/Nav no Scroll
        let lastScrollTop = 0;
        const header = document.getElementById('main-header');
        const nav = document.getElementById('bottom-nav');

        window.addEventListener('scroll', () => {
            let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            if (currentScroll < 0) return;

            if (currentScroll > lastScrollTop && currentScroll > 50) {
                header.classList.add('-translate-y-full');
                nav.classList.add('translate-y-[150%]');
            } else {
                header.classList.remove('-translate-y-full');
                nav.classList.remove('translate-y-[150%]');
            }
            lastScrollTop = currentScroll;
        });
    </script>
</body>
</html>
